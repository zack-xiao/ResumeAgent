<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>肖正烁的个人Agent</title>

<body>

                            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <span class="logo-text">肖正烁 Agent</span>
                </div>
            </div>

            <div class="sidebar-content">
                <div class="user-profile">
                    <div class="avatar-large">
                        <img src="/data/头像.jpg" alt="头像" />
                    </div>
                    <div class="profile-info">
                        <h2 id="ai-name">肖正烁的 AI 助手</h2>
                        <p class="status">
                            <span class="status-dot"></span>
                            在线

                <div class="features">

                        <li>📋 他的工作经历与项目经验</li>
                        <li>💻 他的技术栈与专业技能</li>
                        <li>🎯 他的职业优势与特点</li>
                    </ul>
                </div>
            </div>

            <div class="sidebar-resume">
                <a href="/api/resume" target="_blank" class="resume-link">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M14 2H6C5.46957 2 4.96086 2.21071 4.58579 2.58579C4.21071 2.96086 4 3.46957 4 4V20C4 20.5304 4.21071 21.0391 4.58579 21.4142C4.96086 21.7893 5.46957 22 6 22H18C18.5304 22 19.0391 21.7893 19.4142 21.4142C19.7893 21.0391 20 20.5304 20 20V8L14 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M14 2V8H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M16 13H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M16 17H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M10 9H9H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>查看简历 PDF</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <p class="tip">💡 试试问我：「你做过最有挑战的项目是什么？」</p>
            </div>
        </aside>

        <!-- 主聊天区域 -->
        <main class="chat-main">
            <!-- Unicorn Studio 背景 -->
            <div class="unicorn-bg" data-us-project="WNNLLwf6gPfzpefwXNJf"></div>
            <!-- 消息列表 -->
            <div class="chat-messages" id="chat-messages">
                <!-- 欢迎卡片 -->
                <div class="welcome-card" id="welcome-card">
                    <div class="welcome-icon">👋</div>
                    <h1>你好，我是肖正烁的 AI 助手</h1>
                    <p>你可以直接向我提问，我会以第一人称帮你介绍正烁的背景和经历</p>
                    <div class="quick-questions">
                        <button class="quick-btn" data-question="介绍一下你自己">介绍一下你自己</button>
                        <button class="quick-btn" data-question="你最擅长的技术是什么？">最擅长的技术</button>
                        <button class="quick-btn" data-question="你做过最有挑战的项目是什么？">最有挑战的项目</button>
                        <button class="quick-btn" data-question="为什么想离开腾讯？">为什么离开腾讯</button>
                    </div>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="chat-input-area">
                <div class="input-container">
                    <div class="input-orb"></div>
                    <textarea 
                        id="message-input" 
                        placeholder="输入你的问题..."
                        rows="1"
                    ></textarea>
                    <button id="send-btn" class="send-btn">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M12 5V19M12 5L6 11M12 5L18 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- 密码弹窗 -->
    <div class="modal-overlay" id="password-modal">
        <div class="modal">
            <div class="modal-icon">🔐</div>
            <h2>请输入访问密码</h2>
            <p>该页面受密码保护，请输入密码继续</p>
            <p>密码纸质简历有提供，或联系肖正烁本人获取(15897888033)</p>
            <div class="password-input-wrapper">
                <input type="password" id="password-input" placeholder="请输入访问密码" />
            </div>
            <p class="error-message" id="password-error"></p>
            <button class="modal-btn" id="password-submit">验证</button>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script type="text/javascript">
        !function(){var u=window.UnicornStudio;if(u&&u.init){if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",function(){u.init()})}else{u.init()}}else{window.UnicornStudio={isInitialized:!1};var i=document.createElement("script");i.src="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v2.1.12/dist/unicornStudio.umd.js",i.onload=function(){if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",function(){UnicornStudio.init()})}else{UnicornStudio.init()}},(document.head||document.body).appendChild(i)}}();
    </script>
    <script>
        // 移除 Unicorn Studio 水印
        (function removeWatermark() {
            const check = setInterval(() => {
                const bg = document.querySelector('.unicorn-bg');
                if (!bg) return;
                // 查找所有可能的水印元素并移除
                const allEls = bg.querySelectorAll('*');
                allEls.forEach(el => {
                    const tag = el.tagName.toLowerCase();
                    const cls = el.className || '';
                    const id = el.id || '';
                    const html = el.innerHTML || '';
                    if ((tag === 'a' && (html.includes('unicorn') || html.includes('Unicorn'))) ||
                        typeof cls === 'string' && (
                            cls.toLowerCase().includes('brand') ||
                            cls.toLowerCase().includes('watermark') ||
                            cls.toLowerCase().includes('attribution')
                        ) ||
                        typeof id === 'string' && id.toLowerCase().includes('attribution')) {
                        el.remove();
                    }
                });
            }, 500);
            setTimeout(() => clearInterval(check), 10000);
        })();
    </script>
</body>
</html>
